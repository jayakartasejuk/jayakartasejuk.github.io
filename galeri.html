<head>

  <title>Galeri Pekerjaan - Jayakarta Sejuk</title>
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      min-height: 100vh;
      overflow-x: hidden;
    }

    body {
      font-family: 'Plus Jakarta Sans', -apple-system, BlinkMacSystemFont, sans-serif;
      background: linear-gradient(180deg, #0284c7 0%, #0369a1 100%);
      color: #ffffff;
      padding: 24px 16px 80px 16px;
      position: relative;
    }

    #particles {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      pointer-events: none;
      z-index: 1;
    }

    .fog {
      position: fixed;
      bottom: 0;
      left: 0;
      width: 100%;
      height: 35%;
      background: radial-gradient(ellipse at bottom, rgba(255, 255, 255, 0.18), transparent 70%);
      filter: blur(30px);
      animation: fog 8s ease-in-out infinite alternate;
      pointer-events: none;
      z-index: 1;
    }

    .container {
      max-width: 420px;
      margin: 0 auto;
      position: relative;
      z-index: 2;
    }

    .top-bar {
      display: flex;
      align-items: center;
      margin-bottom: 20px;
    }

    .btn-back {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 8px 16px;
      border-radius: 14px;
      background: rgba(0, 229, 255, 0.12);
      border: 1px solid rgba(0, 229, 255, 0.4);
      color: #ffffff;
      text-decoration: none;
      font-size: 12.5px;
      font-weight: 700;
      backdrop-filter: blur(12px);
      box-shadow: 0 0 15px rgba(0, 212, 255, 0.3);
      transition: all 0.3s ease;
    }

    .btn-back svg {
      width: 16px;
      height: 16px;
      fill: none;
      stroke: currentColor;
      stroke-width: 2.5;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .header-title {
      text-align: center;
      margin-bottom: 24px;
    }

    .header-title h1 {
      font-size: 22px;
      font-weight: 800;
      letter-spacing: 1.2px;
      text-transform: uppercase;
      margin-bottom: 4px;
    }

    .header-title p {
      font-size: 12px;
      color: #e0f2fe;
    }

    .gallery-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 14px;
    }

    /* Kotak Galeri Perbaikan Layout */
    .gallery-item {
      position: relative;
      border-radius: 20px;
      overflow: hidden;
      background: rgba(255, 255, 255, 0.10);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      
      border: 1px solid rgba(0, 229, 255, 0.4);
      box-shadow: 0 0 25px rgba(0, 212, 255, 0.35), 
                  0 0 50px rgba(0, 150, 255, 0.15),
                  inset 0 0 12px rgba(0, 229, 255, 0.15);
                  
      cursor: pointer;
      transition: all 0.3s ease;
      aspect-ratio: 1 / 1;
    }

    .gallery-item img {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      z-index: 2;
    }

    .placeholder-icon {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 6px;
      color: rgba(255, 255, 255, 0.6);
      z-index: 1;
    }

    .placeholder-icon svg {
      width: 32px;
      height: 32px;
      fill: none;
      stroke: currentColor;
      stroke-width: 1.5;
    }

    /* Modal Lightbox */
    .lightbox {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(2, 132, 199, 0.92);
      backdrop-filter: blur(16px);
      z-index: 100;
      display: none;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .lightbox.active {
      display: flex;
    }

    .lightbox-content {
      max-width: 92%;
      max-height: 80vh;
      border-radius: 20px;
      border: 1px solid rgba(0, 229, 255, 0.5);
      box-shadow: 0 0 30px rgba(0, 212, 255, 0.4);
      object-fit: contain;
    }

    .close-lightbox {
      position: absolute;
      top: 24px;
      right: 24px;
      width: 42px;
      height: 42px;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.2);
      border: 1px solid rgba(255, 255, 255, 0.5);
      color: #fff;
      font-size: 22px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
    }

    .floating-wa {
      position: fixed;
      right: 20px;
      bottom: 20px;
      width: 54px;
      height: 54px;
      border-radius: 50%;
      background: #25D366;
      color: #fff;
      display: flex;
      align-items: center;
      justify-content: center;
      text-decoration: none;
      box-shadow: 0 4px 20px rgba(37, 211, 102, 0.5);
      z-index: 10;
      animation: pulse-green 2.5s infinite;
    }

    .floating-wa svg {
      width: 26px;
      height: 26px;
      fill: currentColor;
    }

    .s {
      position: absolute;
      top: -10px;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.8);
      pointer-events: none;
      animation: fall linear infinite;
    }

    @keyframes fall {
      to { transform: translateY(105vh); }
    }

    @keyframes pulse-green {
      0%, 100% { box-shadow: 0 0 0 0 rgba(37, 211, 102, 0.7); }
      50% { box-shadow: 0 0 0 14px rgba(37, 211, 102, 0); }
    }

    @keyframes fog {
      from { opacity: 0.6; }
      to { opacity: 1; }
    }
  </style>
</head>

  <script>
    const particleContainer = document.getElementById('particles');
    const particleCount = 25;
    
    for (let i = 0; i < particleCount; i++) {
      let particle = document.createElement('div');
      particle.className = 's';
      let size = Math.random() * 3 + 1;
      particle.style.width = size + 'px';
      particle.style.height = size + 'px';
      particle.style.left = Math.random() * 100 + '%';
      particle.style.animationDuration = (5 + Math.random() * 7) + 's';
      particle.style.animationDelay = (-Math.random() * 8) + 's';
      particle.style.opacity = Math.random() * 0.7 + 0.3;
      particleContainer.appendChild(particle);
    }

    function openLightbox(imageSrc) {
      document.getElementById('lightbox-img').src = imageSrc;
      document.getElementById('lightbox').classList.add('active');
    }

    function closeLightbox() {
      document.getElementById('lightbox').classList.remove('active');
