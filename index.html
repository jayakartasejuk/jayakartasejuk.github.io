<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Jayakarta Sejuk - Spesialis AC</title>
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    /* Kunci layar agar tidak bisa digeser ke samping */
    html, body {
      width: 100%;
      height: 100%;
      overflow-x: hidden;
      position: relative;
    }

    body {
      min-height: 100vh;
      font-family: 'Plus Jakarta Sans', -apple-system, BlinkMacSystemFont, sans-serif;
      background: linear-gradient(135deg, #0284c7 0%, #0369a1 50%, #0f172a 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 16px;
    }

    /* Fog Effect Aman (100% Width) */
    .fog {
      position: absolute;
      bottom: 0;
      left: 0;
      width: 100%;
      height: 35%;
      background: radial-gradient(ellipse at bottom, rgba(255, 255, 255, 0.15), transparent 70%);
      filter: blur(30px);
      animation: fog 8s ease-in-out infinite alternate;
      pointer-events: none;
    }

    /* KARTU UTAMA */
    .card {
      position: relative;
      z-index: 2;
      width: calc(100% - 10px);
      max-width: 380px;
      padding: 32px 20px;
      border-radius: 28px;
      background: rgba(255, 255, 255, 0.10);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      
      /* Border & Pendaran Cyan */
      border: 1px solid rgba(0, 229, 255, 0.4);
      box-shadow: 0 0 35px rgba(0, 212, 255, 0.4), 
                  0 0 70px rgba(0, 150, 255, 0.2),
                  inset 0 0 15px rgba(0, 229, 255, 0.15);
                  
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
      color: #ffffff;
      animation: float 5s ease-in-out infinite;
    }

    /* Status Badge Top */
    .status-badge {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 6px 16px;
      border-radius: 20px;
      background: rgba(0, 229, 255, 0.12);
      border: 1px solid rgba(0, 229, 255, 0.35);
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.8px;
      color: #7dd3fc;
      text-transform: uppercase;
      margin-bottom: 18px;
    }

    .status-dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: #22c55e;
      box-shadow: 0 0 8px #22c55e;
    }

    /* Header Brand */
    .brand-title {
      font-size: 28px;
      font-weight: 800;
      letter-spacing: 1.5px;
      line-height: 1.15;
      margin-bottom: 6px;
      text-transform: uppercase;
      color: #ffffff;
      text-shadow: 0 2px 10px rgba(0,0,0,0.2);
    }

    .brand-subtitle {
      font-size: 12px;
      font-weight: 700;
      color: #7dd3fc;
      text-transform: uppercase;
      letter-spacing: 2px;
      margin-bottom: 18px;
    }

    .divider {
      width: 45px;
      height: 3px;
      background: rgba(255, 255, 255, 0.35);
      margin: 0 auto 20px auto;
      border-radius: 2px;
    }

    /* Service Chips */
    .service-chips {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 8px;
      width: 100%;
      margin-bottom: 22px;
    }

    .chip {
      font-size: 11.5px;
      font-weight: 600;
      padding: 6px 12px;
      border-radius: 10px;
      background: rgba(255, 255, 255, 0.08);
      border: 1px solid rgba(255, 255, 255, 0.18);
      color: #e0f2fe;
    }

    /* Info Lokasi Container */
    .info-group {
      width: 100%;
      background: rgba(0, 0, 0, 0.14);
      border-radius: 16px;
      padding: 12px 14px;
      border: 1px solid rgba(255, 255, 255, 0.08);
      margin-bottom: 22px;
    }

    .location-base {
      font-size: 13.5px;
      font-weight: 700;
      color: #ffffff;
      margin-bottom: 4px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
    }

    .location-coverage {
      font-size: 11.5px;
      color: #bae6fd;
      line-height: 1.4;
    }

    /* BOX GALERI HASIL KERJA */
    .btn-gallery {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      width: 100%;
      padding: 15px 20px;
      border-radius: 18px;
      background: rgba(0, 229, 255, 0.15);
      border: 1px solid rgba(0, 229, 255, 0.5);
      color: #ffffff;
      text-decoration: none;
      font-weight: 700;
      font-size: 14.5px;
      box-shadow: 0 0 20px rgba(0, 229, 255, 0.35), 
                  inset 0 0 10px rgba(0, 229, 255, 0.2);
      transition: all 0.3s ease;
      animation: pulse-cyan 3s infinite;
    }

    .btn-gallery:hover {
      background: rgba(0, 229, 255, 0.28);
      transform: translateY(-2px);
      box-shadow: 0 0 25px rgba(0, 229, 255, 0.5);
    }

    .btn-gallery svg {
      width: 20px;
      height: 20px;
      fill: none;
      stroke: currentColor;
      stroke-width: 2;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    /* FLOATING WHATSAPP BUTTON */
    .floating-wa {
      position: fixed;
      right: 20px;
      bottom: 20px;
      width: 56px;
      height: 56px;
      border-radius: 50%;
      background: #25D366;
      color: #fff;
      display: flex;
      align-items: center;
      justify-content: center;
      text-decoration: none;
      box-shadow: 0 4px 20px rgba(37, 211, 102, 0.5);
      z-index: 10;
      transition: transform 0.3s ease;
      animation: pulse-green 2.5s infinite;
    }

    .floating-wa:hover {
      transform: scale(1.1);
    }

    .floating-wa svg {
      width: 28px;
      height: 28px;
      fill: currentColor;
    }

    /* Particles Effect */
    .s {
      position: fixed;
      top: -10px;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.8);
      pointer-events: none;
      animation: fall linear infinite;
    }

    /* Animations */
    @keyframes fall {
      to { transform: translateY(105vh); }
    }

    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-6px); }
    }

    @keyframes pulse-cyan {
      0%, 100% { 
        box-shadow: 0 0 15px rgba(0, 229, 255, 0.3), inset 0 0 8px rgba(0, 229, 255, 0.15); 
      }
      50% { 
        box-shadow: 0 0 28px rgba(0, 229, 255, 0.6), inset 0 0 15px rgba(0, 229, 255, 0.3); 
      }
    }

    @keyframes pulse-green {
      0%, 100% { box-shadow: 0 0 0 0 rgba(37, 211, 102, 0.7); }
      50% { box-shadow: 0 0 0 16px rgba(37, 211, 102, 0); }
    }

    @keyframes fog {
      from { opacity: 0.6; }
      to { opacity: 1; }
    }
  </style>
</head>
<body>

  <div class="fog"></div>

  <main class="card">
    <div class="status-badge">
      <span class="status-dot"></span> Jasa Perbaikan AC
    </div>

    <h1 class="brand-title">JAYAKARTA<br>SEJUK</h1>
    <p class="brand-subtitle">Air Conditioning Specialist</p>
    
    <div class="divider"></div>

    <div class="service-chips">
      <span class="chip">AC Split Wall</span>
      <span class="chip">AC Cassette</span>
      <span class="chip">AC Standing Floor</span>
      <span class="chip">AC Ducting</span>
    </div>

    <div class="info-group">
      <p class="location-base">📍 Rawamangun, Jakarta Timur</p>
      <p class="location-coverage">Area Service: Jakarta • Bekasi • Tangerang</p>
    </div>

    <a class="btn-gallery" href="#galeri" target="_blank" rel="noopener">
      <svg viewBox="0 0 24 24">
        <rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect>
        <circle cx="8.5" cy="8.5" r="1.5"></circle>
        <polyline points="21 15 16 10 5 21"></polyline>
      </svg>
      Galeri Hasil Kerja
    </a>
  </main>

  <a class="floating-wa" href="https://wa.me/62881010050528" target="_blank" rel="noopener" aria-label="WhatsApp">
    <svg viewBox="0 0 24 24"><path d="M12.012 2c-5.506 0-9.989 4.478-9.99 9.984 0 1.758.459 3.474 1.33 4.982L2 22l5.176-1.332a9.982 9.982 0 004.832 1.252h.005c5.505 0 9.988-4.478 9.989-9.984 0-2.668-1.037-5.176-2.922-7.062A9.927 9.927 0 0012.012 2z"/></svg>
  </a>

  <script>
    const particleCount = 35;
    for (let i = 0; i < particleCount; i++) {
      let particle = document.createElement('div');
      particle.className = 's';
      
      let size = Math.random() * 3 + 1;
      particle.style.width = size + 'px';
      particle.style.height = size + 'px';
      
      particle.style.left = Math.random() * 100 + 'vw';
      particle.style.animationDuration = (5 + Math.random() * 7) + 's';
      particle.style.animationDelay = (-Math.random() * 8) + 's';
      particle.style.opacity = Math.random() * 0.7 + 0.3;
      
      document.body.appendChild(particle);
    }
  </script>
</body>
</html>
